        stage: "chatbot_overview"
        followups:
          - delay: 5000
            text: "Sag gerne Bescheid, wenn du Fragen hast 👋"
          - delay: 40000
            text: "Interessiert dich auch die Technik? Ansonsten kann ich dir auch gerne was zu meiner anstehenden Praxisphase
            erzählen 🙂"
