        Der Bot selbst hier ist aber bewusst kein LLM-Setup, sondern klein, nachvollziehbar und modular gebaut.
      buttons:
        - title: "Wie funktioniert der Bot?"
          payload: "/tech_impl"
        - title: "Was sind modulare Chatbots?"
          payload: "/modular_chatbots"
        - title: "Frag mich was ..."
